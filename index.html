<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abolfazl Music</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Tahoma,sans-serif;
        }

        body{
            background:#111;
            color:white;
        }

        header{
            background:#1e1e1e;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        main{
            display:flex;
            justify-content:center;
            align-items:center;
            height:80vh;
            flex-direction:column;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:40px;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            max-width:600px;
            line-height:1.8;
        }

        button{
            margin-top:30px;
            padding:15px 35px;
            border:none;
            border-radius:10px;
            background:#00b894;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#00a383;
        }

        @media (max-width:768px){

            header{
                font-size:22px;
            }

            h1{
                font-size:30px;
            }

            p{
                font-size:17px;
            }

            button{
                width:100%;
                max-width:300px;
            }

        }
    </style>
</head>

<body>

<header>
Abolfazl Music
</header>

<main>

<h1>🎉 اولین سایت من</h1>

<p>
این سایت با HTML و CSS ساخته شده است و برای موبایل و کامپیوتر کاملاً بهینه است.
</p>

<button>شروع یادگیری برنامه‌نویسی</button>

</main>

</body>
</html>
